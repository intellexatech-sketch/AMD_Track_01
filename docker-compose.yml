version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - FIREWORKS_API_KEY=${FIREWORKS_API_KEY}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    volumes:
      - ./metrics.db:/metrics.db

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
